<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main">
        <div class="task-asign">
            <h1>Create a Task</h1>
            <p>Add a new task</p>
            <form action="">
                <input type="text" placeholder="Enter The Task">
                <select name="Work">
                    <option>Work</option>
                    <option>Urgent</option>
                    <option>Study</option>

                </select>
                <button class="btn">Add Task</button>
            </form>
        </div>


        <div class="task-apear">
            <h1>Your Tasks</h1>
           
            <div class="task-box">
                <div class="text">
                    <h5>Task</h5>
                </div>
                <div class="btns">
                    <div class="type">Urgent</div>
                    <button class="btn btn-1">Edit</button>
                    <button class="btn btn-2">Complete</button>
                    <button class="btn btn-3">Delete</button>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
